name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run legacy tests
        run: ./gradlew legacyTest --no-daemon

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: 서버에 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.34.55.28
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_NAME,DB_USER,DB_PASSWORD,DB_ROOT_PASSWORD,JWT_SECRET,ENCRYPTION_SECRET_KEY,ENCRYPTION_HASH_KEY,KAKAO_REST_API_KEY,NAVER_CLIENT_ID,NAVER_CLIENT_SECRET,NAVER_REDIRECT_URI,NCP_ACCESS_KEY,NCP_SECRET_KEY,NCP_BUCKET,NCP_CDN_DOMAIN,DEV_LOGIN_PASSWORD,FIREBASE_SERVICE_ACCOUNT_JSON,APPLE_BUNDLE_ID,APPLE_TEAM_ID,APPLE_KEY_ID,APPLE_PRIVATE_KEY
          script: |
            cd /home/ubuntu/Pawever-back

            # 최신 코드로 정렬
            git fetch origin main
            git checkout -B main origin/main

            # Firebase 서비스 계정 키 파일 생성
            echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > /home/ubuntu/Pawever-back/firebase-service-account.json

            cat > .env << EOF
            DB_NAME=$DB_NAME
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_ROOT_PASSWORD=$DB_ROOT_PASSWORD
            JWT_SECRET=$JWT_SECRET
            ENCRYPTION_SECRET_KEY=$ENCRYPTION_SECRET_KEY
            ENCRYPTION_HASH_KEY=$ENCRYPTION_HASH_KEY
            KAKAO_REST_API_KEY=$KAKAO_REST_API_KEY
            NAVER_CLIENT_ID=$NAVER_CLIENT_ID
            NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
            NAVER_REDIRECT_URI=$NAVER_REDIRECT_URI
            NCP_ACCESS_KEY=$NCP_ACCESS_KEY
            NCP_SECRET_KEY=$NCP_SECRET_KEY
            NCP_BUCKET=$NCP_BUCKET
            NCP_CDN_DOMAIN=$NCP_CDN_DOMAIN
            DEV_LOGIN_PASSWORD=$DEV_LOGIN_PASSWORD
            FIREBASE_CREDENTIALS_PATH=file:/app/firebase-service-account.json
            APPLE_BUNDLE_ID=$APPLE_BUNDLE_ID
            APPLE_TEAM_ID=$APPLE_TEAM_ID
            APPLE_KEY_ID=$APPLE_KEY_ID
            APPLE_PRIVATE_KEY=$APPLE_PRIVATE_KEY
            EOF

            UPSTREAM_CONF=/etc/nginx/conf.d/pawever-upstream.conf

            # 대상 포트의 /health 가 200 될 때까지 최대 120초 대기
            wait_healthy() {
              for _ in $(seq 1 24); do
                if curl -fsS "http://localhost:$1/health" > /dev/null 2>&1; then return 0; fi
                sleep 5
              done
              return 1
            }

            # 현재 nginx 활성 포트 → 반대편(비활성) 색 결정
            CURRENT_PORT=$(grep -oE '28080|28081' "$UPSTREAM_CONF" 2>/dev/null | head -1)
            if [ "$CURRENT_PORT" = "28081" ]; then
              NEW_COLOR=blue;  NEW_PORT=28080; OLD_COLOR=green
            else
              NEW_COLOR=green; NEW_PORT=28081; OLD_COLOR=blue
            fi
            echo "▶ 배포: ${OLD_COLOR}(${CURRENT_PORT:-none}) → ${NEW_COLOR}(${NEW_PORT})"

            # 비활성 색만 빌드·기동 (DB·현재 서빙 색은 그대로 유지)
            docker compose --profile bluegreen up -d --build "app-${NEW_COLOR}" > /tmp/deploy.log 2>&1

            if wait_healthy "$NEW_PORT"; then
              # nginx upstream 을 새 포트로 전환 + graceful reload → 끊김 0
              echo "upstream pawever_backend { server 127.0.0.1:${NEW_PORT}; }" | sudo tee "$UPSTREAM_CONF" > /dev/null
              if sudo nginx -t && sudo nginx -s reload; then
                echo "✅ 무중단 전환 성공 → ${NEW_COLOR}:${NEW_PORT}"
                docker compose stop "app-${OLD_COLOR}" > /dev/null 2>&1 || true
              else
                echo "🚨 nginx 리로드 실패 → 전환 취소(기존 ${OLD_COLOR} 유지)"
                docker compose stop "app-${NEW_COLOR}" > /dev/null 2>&1 || true
                exit 1
              fi
            else
              echo "❌ 새 버전(${NEW_COLOR}:${NEW_PORT}) 헬스체크 실패 → 전환 안 함(기존 ${OLD_COLOR} 계속 서빙, 무중단 유지)"
              tail -50 /tmp/deploy.log
              docker compose stop "app-${NEW_COLOR}" > /dev/null 2>&1 || true
              exit 1
            fi
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_SECRET_KEY: ${{ secrets.ENCRYPTION_SECRET_KEY }}
          ENCRYPTION_HASH_KEY: ${{ secrets.ENCRYPTION_HASH_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_REDIRECT_URI: ${{ secrets.NAVER_REDIRECT_URI }}
          NCP_ACCESS_KEY: ${{ secrets.NCP_ACCESS_KEY }}
          NCP_SECRET_KEY: ${{ secrets.NCP_SECRET_KEY }}
          NCP_BUCKET: ${{ secrets.NCP_BUCKET }}
          NCP_CDN_DOMAIN: ${{ secrets.NCP_CDN_DOMAIN }}
          DEV_LOGIN_PASSWORD: ${{ secrets.DEV_LOGIN_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
