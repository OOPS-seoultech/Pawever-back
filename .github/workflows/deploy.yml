name: Deploy to NCP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 서버에 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 211.188.62.74
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_NAME,DB_USER,DB_PASSWORD,DB_ROOT_PASSWORD,JWT_SECRET,ENCRYPTION_SECRET_KEY,ENCRYPTION_HASH_KEY,KAKAO_REST_API_KEY,NAVER_CLIENT_ID,NAVER_CLIENT_SECRET,NAVER_REDIRECT_URI,NCP_ACCESS_KEY,NCP_SECRET_KEY,NCP_BUCKET,NCP_CDN_DOMAIN,DEV_LOGIN_PASSWORD
          script: |
            cd /root/Pawever-back

            git pull origin main

            cat > .env << EOF
            DB_NAME=$DB_NAME
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_ROOT_PASSWORD=$DB_ROOT_PASSWORD
            JWT_SECRET=$JWT_SECRET
            ENCRYPTION_SECRET_KEY=$ENCRYPTION_SECRET_KEY
            ENCRYPTION_HASH_KEY=$ENCRYPTION_HASH_KEY
            KAKAO_REST_API_KEY=$KAKAO_REST_API_KEY
            NAVER_CLIENT_ID=$NAVER_CLIENT_ID
            NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
            NAVER_REDIRECT_URI=$NAVER_REDIRECT_URI
            NCP_ACCESS_KEY=$NCP_ACCESS_KEY
            NCP_SECRET_KEY=$NCP_SECRET_KEY
            NCP_BUCKET=$NCP_BUCKET
            NCP_CDN_DOMAIN=$NCP_CDN_DOMAIN
            DEV_LOGIN_PASSWORD=$DEV_LOGIN_PASSWORD
            EOF

            docker compose down
            if docker compose up -d --build > /tmp/deploy.log 2>&1; then
              echo "--- Deploy 성공 ---"
              docker compose ps
              echo "--- 미사용 컨테이너·이미지·빌드 캐시 정리 ---"
              docker system prune -af
            else
              echo "--- Deploy 실패 (마지막 50줄) ---"
              tail -50 /tmp/deploy.log
              exit 1
            fi
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_SECRET_KEY: ${{ secrets.ENCRYPTION_SECRET_KEY }}
          ENCRYPTION_HASH_KEY: ${{ secrets.ENCRYPTION_HASH_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_REDIRECT_URI: ${{ secrets.NAVER_REDIRECT_URI }}
          NCP_ACCESS_KEY: ${{ secrets.NCP_ACCESS_KEY }}
          NCP_SECRET_KEY: ${{ secrets.NCP_SECRET_KEY }}
          NCP_BUCKET: ${{ secrets.NCP_BUCKET }}
          NCP_CDN_DOMAIN: ${{ secrets.NCP_CDN_DOMAIN }}
          DEV_LOGIN_PASSWORD: ${{ secrets.DEV_LOGIN_PASSWORD }}
