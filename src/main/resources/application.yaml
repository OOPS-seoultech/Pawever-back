spring:
  application:
    name: pawever-backend

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost:23306}/${DB_NAME:pawever}
    username: ${DB_USER:pawever}
    password: ${DB_PASSWORD:pawever1234}
    driver-class-name: org.mariadb.jdbc.Driver

  # 스키마는 Flyway가 관리한다. 이미 스키마가 있는 DB(운영)는 V1을 실행하지 않고 기준선으로만 마킹.
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 100  # 지연 로딩 N+1 완화 (IN 절 배치 조회)
    # Flyway가 Hibernate보다 먼저 스키마를 준비해야 하므로 JPA 뒤로 초기화를 미루지 않는다.
    defer-datasource-initialization: false

  sql:
    init:
      mode: always
      # Local run (non-docker): seed data only.
      # Schema is managed by Hibernate (ddl-auto).
      data-locations: classpath:breeds_data.sql,classpath:missions_data.sql,classpath:funeral_companies_data.sql,classpath:data.sql,classpath:faq_data.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:pawever-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: 86400000  # 24 hours

dev:
  login:
    password: ${DEV_LOGIN_PASSWORD:}

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:cGF3ZXZlci1hZXMtMjU2LWtleS0zMmJ5dGVzLWxvbmc=}
  hash-key: ${ENCRYPTION_HASH_KEY:aGFzaC1rZXktZm9yLWJsaW5kLWluZGV4LTMyYnl0ZXM=}

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}

naver:
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}

apple:
  bundle-id: ${APPLE_BUNDLE_ID:}
  team-id: ${APPLE_TEAM_ID:}
  key-id: ${APPLE_KEY_ID:}
  private-key: ${APPLE_PRIVATE_KEY:}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}

cloud:
  ncp:
    credentials:
      access-key: ${NCP_ACCESS_KEY:}
      secret-key: ${NCP_SECRET_KEY:}
    region: ${NCP_REGION:ap-northeast-2}
    s3:
      endpoint: ${NCP_S3_ENDPOINT:}
      bucket: ${NCP_BUCKET:}
    cdn:
      domain: ${NCP_CDN_DOMAIN:}

survey:
  goods:
    campaign-id: ${GOODS_SURVEY_CAMPAIGN_ID:goods-2026-07}
    questionnaire-version: 2026-07-23-v1
    privacy-consent-version: 2026-07-23
    # 제작 사진은 기존 공개 이미지 버킷과 분리한 AWS S3 비공개 버킷에 저장한다.
    photo-bucket: ${GOODS_SURVEY_S3_BUCKET:}
    reservation-minutes: 15
    upload-url-minutes: 10
    personal-data-retention-days: 90
