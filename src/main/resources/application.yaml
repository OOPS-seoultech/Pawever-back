spring:
  application:
    name: pawever-backend

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost:23306}/${DB_NAME:pawever}
    username: ${DB_USER:pawever}
    password: ${DB_PASSWORD:pawever1234}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      # Local run (non-docker): seed data only.
      # Schema is managed by Hibernate (ddl-auto).
      data-locations: classpath:breeds_data.sql,classpath:missions_data.sql,classpath:funeral_companies_data.sql,classpath:data.sql,classpath:faq_data.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:pawever-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: 86400000  # 24 hours

dev:
  login:
    password: ${DEV_LOGIN_PASSWORD:}

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:cGF3ZXZlci1hZXMtMjU2LWtleS0zMmJ5dGVzLWxvbmc=}
  hash-key: ${ENCRYPTION_HASH_KEY:aGFzaC1rZXktZm9yLWJsaW5kLWluZGV4LTMyYnl0ZXM=}

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}

naver:
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}
  redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:28080/oauth/naver/callback}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}

cloud:
  ncp:
    credentials:
      access-key: ${NCP_ACCESS_KEY:}
      secret-key: ${NCP_SECRET_KEY:}
    region: kr-standard
    s3:
      endpoint: https://kr.object.ncloudstorage.com
      bucket: ${NCP_BUCKET:}
    cdn:
      domain: ${NCP_CDN_DOMAIN:}
