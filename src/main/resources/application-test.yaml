spring:
  datasource:
    url: jdbc:h2:mem:pawever_test;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
    defer-datasource-initialization: false
  sql:
    init:
      mode: never

cloud:
  ncp:
    credentials:
      access-key: dummy
      secret-key: dummy
