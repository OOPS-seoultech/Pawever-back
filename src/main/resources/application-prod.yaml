# 로그 파일 경로 (NCP 서버에서는 /var/log/pawever 등으로 설정 가능)
logging:
  file:
    path: ${LOG_PATH:-./logs}

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.userdetails.UserDetailsServiceAutoConfiguration

  datasource:
    # DB 호스트를 env로 분리 — 기본값은 현재 compose의 mariadb 컨테이너.
    # 나중에 RDS 등 관리형 DB로 전환 시 DB_HOST 환경변수만 rds 엔드포인트로 바꾸면 됨.
    url: jdbc:mariadb://${DB_HOST:mariadb:3306}/${DB_NAME:pawever}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # In docker-compose dev flow, MariaDB runs init scripts from /docker-entrypoint-initdb.d.
  # Disable Spring SQL init to avoid double-seeding.
  sql:
    init:
      mode: never

  docker:
    compose:
      enabled: false

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:file:/app/firebase-service-account.json}
