# 로그 파일 경로 (NCP 서버에서는 /var/log/pawever 등으로 설정 가능)
logging:
  file:
    path: ${LOG_PATH:-./logs}

spring:
  datasource:
    url: jdbc:mariadb://mariadb:3306/${DB_NAME:pawever}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # In docker-compose dev flow, MariaDB runs init scripts from /docker-entrypoint-initdb.d.
  # Disable Spring SQL init to avoid double-seeding.
  sql:
    init:
      mode: never

  docker:
    compose:
      enabled: false

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:file:/app/firebase-service-account.json}
