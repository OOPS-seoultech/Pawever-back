# 공통 앱 설정 — 로컬용 app 과 운영 무중단용 app-blue/app-green 이 공유 (포트만 다름)
x-app-common: &app-common
  build: .
  env_file:
    - .env
  environment:
    SPRING_PROFILES_ACTIVE: prod
    LOG_PATH: /app/logs
    NCP_ACCESS_KEY: ${NCP_ACCESS_KEY:-}
    NCP_SECRET_KEY: ${NCP_SECRET_KEY:-}
    NCP_BUCKET: ${NCP_BUCKET:-}
    NCP_CDN_DOMAIN: ${NCP_CDN_DOMAIN:-}
  volumes:
    - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    - ./logs:/app/logs
  depends_on:
    mariadb:
      condition: service_healthy
  networks:
    - pawever-net

services:
  mariadb:
    image: mariadb:latest
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "23306:3306"
    # /var/lib/mysql은 named volume으로 영속화. init SQL은 데이터 디렉터리가 비어 있을 때만 1회 실행.
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./src/main/resources/Pawever.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
      - ./src/main/resources/breeds_data.sql:/docker-entrypoint-initdb.d/10_breeds_data.sql:ro
      - ./src/main/resources/missions_data.sql:/docker-entrypoint-initdb.d/20_missions_data.sql:ro
      - ./src/main/resources/funeral_companies_data.sql:/docker-entrypoint-initdb.d/30_funeral_companies_data.sql:ro
      - ./src/main/resources/data.sql:/docker-entrypoint-initdb.d/40_data.sql:ro
      - ./src/main/resources/faq_data.sql:/docker-entrypoint-initdb.d/50_faq_data.sql:ro
      - ./src/main/resources/local_runtime_seed.sql:/docker-entrypoint-initdb.d/60_local_runtime_seed.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pawever-net

  # 로컬 개발용 (docker compose up 하면 이게 뜸). 운영에선 안 씀.
  app:
    <<: *app-common
    ports:
      - "28080:8080"

  # 운영 무중단(blue-green)용 — profile 로 격리되어 bare `docker compose up` 에는 안 뜸.
  # 배포 스크립트가 비활성 색을 명시적으로 기동한 뒤 nginx upstream 을 전환한다.
  app-blue:
    <<: *app-common
    profiles: ["bluegreen"]
    ports:
      - "28080:8080"
  app-green:
    <<: *app-common
    profiles: ["bluegreen"]
    ports:
      - "28081:8080"

volumes:
  mariadb-data:

networks:
  pawever-net:
