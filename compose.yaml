services:
  mariadb:
    image: mariadb:latest
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "23306:3306"
    # Dev-friendly: always start from a clean database.
    # - tmpfs makes /var/lib/mysql ephemeral (reset on container restart)
    # - init scripts run only when the data dir is empty
    tmpfs:
      - /var/lib/mysql
    volumes:
      - ./src/main/resources/Pawever.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
      - ./src/main/resources/breeds_data.sql:/docker-entrypoint-initdb.d/10_breeds_data.sql:ro
      - ./src/main/resources/missions_data.sql:/docker-entrypoint-initdb.d/20_missions_data.sql:ro
      - ./src/main/resources/funeral_companies_data.sql:/docker-entrypoint-initdb.d/30_funeral_companies_data.sql:ro
      - ./src/main/resources/data.sql:/docker-entrypoint-initdb.d/40_data.sql:ro
      - ./src/main/resources/faq_data.sql:/docker-entrypoint-initdb.d/50_faq_data.sql:ro
      - ./src/main/resources/local_runtime_seed.sql:/docker-entrypoint-initdb.d/60_local_runtime_seed.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pawever-net

  app:
    build: .
    ports:
      - "28080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      LOG_PATH: /app/logs
      NCP_ACCESS_KEY: ${NCP_ACCESS_KEY:-}
      NCP_SECRET_KEY: ${NCP_SECRET_KEY:-}
      NCP_BUCKET: ${NCP_BUCKET:-}
      NCP_CDN_DOMAIN: ${NCP_CDN_DOMAIN:-}
    volumes:
      - app-logs:/app/logs
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - pawever-net

volumes:
  app-logs:

networks:
  pawever-net:
